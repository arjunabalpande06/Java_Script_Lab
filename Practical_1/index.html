<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Demo</title>
    
    <!-- INTERNAL JAVASCRIPT -->
    <script>
        // Runs automatically when the script tag is parsed
        console.log("Internal script loaded.");

        function showWelcome() {
            // Target the heading and update its text
            const output = document.getElementById("welcome-message");
            output.textContent = "Welcome to the site! Check your browser console to see the logged environment info.";
            output.style.color = "green";
        }
    </script>
</head>
<body>

    <h1>JavaScript Implementation Demo</h1>
    <p>Press the button below to trigger the internal and inline JavaScript functions.</p>
    
    <!-- INLINE JAVASCRIPT -->
    <!-- Calls the internal function and runs a console command directly in the attribute -->
    <button onclick="showWelcome(); console.log('Inline button click event triggered.');">
        Show Welcome Message
    </button>

    <h3 id="welcome-message"></h3>

    <!-- EXTERNAL JAVASCRIPT LINK -->
    <script src="script.js"></script>
</body>
</html>
