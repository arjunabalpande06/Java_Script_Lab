<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robust Palindrome Checker</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --border-color: #dddddd;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #2c3e50;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .result.success {
            display: block;
            background-color: #e8f8f0;
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .result.error {
            display: block;
            background-color: #fdeaea;
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }
    </style>
</head>

<body>
    

    <div class="container">
        <h3>ARJUN BALPANDE</h3>
        <h3>24070521074</h3>
        <h1>Palindrome Checker</h1>
        
        <div class="form-group">
            <label for="text-input">Enter text to check:</label>
            <input type="text" id="text-input" placeholder="e.g., Racecar or Madam, I'm Adam">
        </div>

        <button id="check-btn">Check Text</button>

        <div id="result-display" class="result"></div>
    </div>
    

    <script>
        // --- Core JavaScript Logic (From Previous Step) ---
        const createPalindromeChecker = () => {
            const ignoredCharacters = new Set([' ', ',', '.', '_', '-', '/', '\\', '|', '(', ')', ':', "'", '"', '!','?']);

            return (input) => {
                try {
                    if (typeof input !== 'string') {
                        throw new TypeError('Input must be a string.');
                    }

                    const cleanChars = input
                        .toLowerCase()
                        .split('')
                        .filter(char => !ignoredCharacters.has(char));

                    const cleanedString = cleanChars.join('');
                    const reversedString = cleanChars.slice().reverse().join(''); // Used slice() to avoid mutating original array if reused

                    if (cleanedString === '') {
                        return false;
                    }

                    return cleanedString === reversedString;

                } catch (error) {
                    console.error(`[Checker Error] ${error.message}`);
                    throw error; // Rethrow to let UI layer handle the specific error messaging
                }
            };
        };

        const isPalindrome = createPalindromeChecker();

        // --- UI Binding Layer ---
        const textInput = document.getElementById('text-input');
        const checkBtn = document.getElementById('check-btn');
        const resultDisplay = document.getElementById('result-display');

        const handleCheck = () => {
            const rawValue = textInput.value;

            try {
                // The UI passes the value directly. 
                // If you want to force test the try-catch error block, you could pass: isPalindrome(null)
                const isValidPalindrome = isPalindrome(rawValue);

                if (rawValue.trim() === "") {
                    resultDisplay.className = "result error";
                    resultDisplay.textContent = "Please enter some text first.";
                    return;
                }

                if (isValidPalindrome) {
                    resultDisplay.className = "result success";
                    resultDisplay.textContent = `🎉 "${rawValue}" is a palindrome!`;
                } else {
                    resultDisplay.className = "result error";
                    resultDisplay.textContent = `❌ "${rawValue}" is NOT a palindrome.`;
                }

            } catch (error) {
                // UI catches the rethrown exception from the core logic safely
                resultDisplay.className = "result error";
                resultDisplay.textContent = `Application Error: ${error.message}`;
            }
        };

        // Event listeners for user interactions
        checkBtn.addEventListener('click', handleCheck);
        
        // Allows pressing "Enter" key inside the input field to trigger the check
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleCheck();
            }
        });
    </script>
    
</body>
</html>
